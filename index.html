<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Trailer Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <h1>Women Trailer Collection</h1>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Discover Stylish Trailers for Women</h2>
        <p>Elegant • Comfortable • Modern Design</p>
        <button>Shop Now</button>
    </section>

    <!-- Product Section -->
    <section class="products">
        <div class="card">
           <img src="https://images.pexels.com/photos/985635/pexels-photo-985635.jpeg" alt="Pink Trailer">
            <h3>Pink Classic Trailer</h3>
            <p>₹2,999</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c" alt="">
            <h3>Modern Black Trailer</h3>
            <p>₹3,499</p>
        </div>

        <div class="card">
           <img src="https://images.pexels.com/photos/994517/pexels-photo-994517.jpeg" alt="Designer Trailer">
            <h3>Premium Designer Trailer</h3>
            <p>₹4,999</p>
        </div>
    </section>

    <!-- Form Section -->
    <section class="form-section">
        <h2>Fill the Form to Order</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="tel" placeholder="Phone Number" required>
            <label for="trailer-select">Select Trailer</label>
            <select id="trailer-select" required>
                <option value="">Select Trailer</option>
                <option>Pink Classic Trailer</option>
                <option>Modern Black Trailer</option>
                <option>Premium Designer Trailer</option>
            </select>
            <textarea placeholder="Address" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Women Trailer Collection | Designed by Rishab</p>
    </footer>

</body>
</html>
